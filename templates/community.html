<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区 · 星云盘</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: url("{{ url_for('static', filename='background.png') }}") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 1rem 2rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-area i {
            font-size: 2rem;
            color: #3b82f6;
            background: rgba(255, 255, 255, 0.6);
            padding: 8px;
            border-radius: 18px;
        }
        .logo-area h1 {
            font-size: 1.7rem;
            background: linear-gradient(135deg, #1e293b, #2d3e5f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
        }
        .btn-outline {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(203, 213, 225, 0.6);
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            color: #1e293b;
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.9);
        }
        .logout-btn {
            background: rgba(239, 68, 68, 0.9);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
        }
        /* 文件网格 */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .file-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .file-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.95);
        }
        .file-title {
            font-weight: 700;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.5rem;
        }
        .file-meta {
            font-size: 0.8rem;
            color: #475569;
            margin-bottom: 0.8rem;
        }
        .file-stats {
            display: flex;
            gap: 1rem;
            margin: 0.8rem 0;
            font-size: 0.9rem;
        }
        .file-stats span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .file-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        button, .download-link {
            background: rgba(59, 130, 246, 0.9);
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }
        button:hover, .download-link:hover {
            background: rgba(37, 99, 235, 0.95);
        }
        .like-btn, .collect-btn {
            background: rgba(255, 255, 255, 0.7);
            color: #1e293b;
            border: 1px solid rgba(203, 213, 225, 0.6);
        }
        .like-btn:hover, .collect-btn:hover {
            background: rgba(255, 255, 255, 0.9);
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 2rem;
            color: #5a6e8a;
        }
        .toast-msg {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .file-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <i class="fas fa-globe"></i>
            <h1>星云盘 · 社区</h1>
        </div>
        <div class="user-info" id="userInfoArea">
            <!-- 动态显示登录/未登录状态 -->
        </div>
    </div>

    <h2 style="margin-bottom: 1rem;"><i class="fas fa-share-alt"></i> 公开文件分享</h2>
    <div id="fileList" class="file-grid">
        <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> 加载中...</div>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    let currentUser = null;

    // 辅助函数
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.backgroundColor = isError ? 'rgba(185, 28, 28, 0.9)' : 'rgba(30, 41, 59, 0.9)';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2800);
    }

    // 检查登录状态
    async function checkAuth() {
        try {
            const res = await fetch('/api/check_auth');
            const data = await res.json();
            if (data.success) {
                currentUser = data.user;
                document.getElementById('userInfoArea').innerHTML = `
                    <span><i class="fas fa-user"></i> ${escapeHtml(currentUser.username)}</span>
                    <a href="/user_center" class="btn-outline"><i class="fas fa-user-circle"></i> 个人中心</a>
                    <button id="logoutBtn" class="logout-btn">登出</button>
                `;
                document.getElementById('logoutBtn').addEventListener('click', async () => {
                    await fetch('/api/logout', { method: 'POST' });
                    window.location.reload();
                });
            } else {
                currentUser = null;
                document.getElementById('userInfoArea').innerHTML = `
                    <span>未登录</span>
                    <a href="/login" class="btn-outline"><i class="fas fa-sign-in-alt"></i> 登录</a>
                    <a href="/login" class="btn-outline">注册</a>
                `;
            }
        } catch (err) {
            showToast('无法获取登录状态', true);
        }
    }

    // 加载公开文件列表
    async function loadCommunityFiles() {
        try {
            const res = await fetch('/api/community/files');
            const data = await res.json();
            if (data.success && data.files.length) {
                renderFileList(data.files);
            } else {
                document.getElementById('fileList').innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无公开文件，快去分享你的作品吧！</p></div>`;
            }
        } catch (err) {
            showToast('加载失败', true);
            document.getElementById('fileList').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>加载失败，请刷新重试</p></div>`;
        }
    }

    function renderFileList(files) {
        let html = '';
        for (let file of files) {
            html += `
                <div class="file-card" data-id="${file.id}">
                    <div class="file-title" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</div>
                    <div class="file-meta">
                        上传者：${escapeHtml(file.uploader)} · ${file.size_human}<br>
                        ${new Date(file.created_at).toLocaleString()}
                    </div>
                    <div class="file-stats">
                        <span><i class="fas fa-thumbs-up"></i> ${file.likes}</span>
                        <span><i class="fas fa-star"></i> ${file.collections}</span>
                    </div>
                    <div class="file-actions">
                        <a href="${file.download_url}" class="download-link" target="_blank"><i class="fas fa-download"></i> 下载</a>
                        ${currentUser ? `
                            <button class="like-btn" data-id="${file.id}"><i class="fas fa-thumbs-up"></i> 点赞</button>
                            <button class="collect-btn" data-id="${file.id}"><i class="fas fa-star"></i> 收藏</button>
                        ` : `
                            <button class="like-btn" disabled style="opacity:0.5;"><i class="fas fa-thumbs-up"></i> 登录后点赞</button>
                            <button class="collect-btn" disabled style="opacity:0.5;"><i class="fas fa-star"></i> 登录后收藏</button>
                        `}
                    </div>
                </div>
            `;
        }
        document.getElementById('fileList').innerHTML = html;

        // 绑定点赞/收藏事件（仅当已登录）
        if (currentUser) {
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const fileId = btn.getAttribute('data-id');
                    await likeFile(fileId);
                });
            });
            document.querySelectorAll('.collect-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const fileId = btn.getAttribute('data-id');
                    await collectFile(fileId);
                });
            });
        }
    }

    async function likeFile(fileId) {
        try {
            const res = await fetch(`/api/community/like/${fileId}`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                showToast('点赞成功！');
                // 刷新列表以更新点赞数
                loadCommunityFiles();
            } else {
                showToast(data.error || '点赞失败', true);
            }
        } catch (err) {
            showToast('请求失败', true);
        }
    }

    async function collectFile(fileId) {
        try {
            const res = await fetch(`/api/community/collect/${fileId}`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                showToast('收藏成功！');
                loadCommunityFiles();
            } else {
                showToast(data.error || '收藏失败', true);
            }
        } catch (err) {
            showToast('请求失败', true);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 初始化
    async function init() {
        await checkAuth();
        await loadCommunityFiles();
    }
    init();
</script>
</body>
</html>
